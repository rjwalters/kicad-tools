# Calibrated default FOM weights (issue #3188).
#
# These are the production default weights for the hybrid FOM (#3186).
# They were derived via a Pareto sweep over 5 train boards
# (voltage_divider, charlieplex_3x3, usb_joystick, stm32_devboard,
# bldc_controller) and validated on 2 holdout boards (diffpair_test,
# matchgroup_test). See docs/research/fom_calibration.md for the full
# methodology, per-board weight breakdowns, and acceptance criteria
# discussion.
#
# Use --fom-config legacy.yaml for the pre-#3188 wirelength-only baseline.
#
# Regenerate with:
#   uv run python scripts/research/calibrate_fom.py
weights:
  trace_length_excess: 1.6126
  weighted_via_count: 0.0107
  turning_penalty: 0.0116
  net_congestion_variance: 0.2226
  match_group_skew: 1.5237
  diff_pair_clearance_margin: 0.9995
  decoupling_proximity: 0.0181
  crossing_count: 0.0145
  thermal_spread: 0.0221
  compactness: 0.0968
