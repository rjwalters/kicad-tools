  # Still admissible (every path advances the slower trace at
  # least ``max(p_dist, n_dist)`` cells, and the spacing penalty
  # is bounded above by the true cost of correcting the
  # divergence) but ranks partner-synchronised moves higher in
  # the priority queue, eliminating the asymmetric-escape
