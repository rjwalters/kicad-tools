  # Bumped 9 -> 17 by Issue #3040 / this PR.  The judge flagged that
  # the previous "0 diffpair_clearance_intra" claim was a non-
  # deterministic one-shot: ``generate_design.py`` ran
  # ``router.route_all()`` (per-net A*) which never engages
