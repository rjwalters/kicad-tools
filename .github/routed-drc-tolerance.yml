# Per-board DRC tolerance allowlist for the `routed-pcb-drc-check` CI job.
#
# This file grandfathers in known-broken routed PCB files so the CI gate can
# land before every board reaches a 0-error state. The gate is "allowed minus
# epsilon": if a board's committed _routed.kicad_pcb produces MORE errors than
# the value listed here (under JLCPCB rules, --errors-only), the job fails.
# This still catches regressions like "board 05 went from 17 -> 22 errors".
#
# Boards NOT listed here MUST report 0 errors. Adding a new entry should be
# considered a regression and require explicit reviewer sign-off in the PR.
#
# How to update:
#   * When a board reaches 0 errors, REMOVE its entry (do not set to 0). The
#     absence of the entry is the strict 0-error gate.
#   * When a board's count IMPROVES (e.g., 17 -> 12), reduce the value here
#     in the same PR that reduces the count, so further regressions are
#     caught against the new floor. Issue #2590 added a CI warning annotation
#     that nags the PR Files-changed view when the actual count is below the
#     allowlist value (slack > 0), so reviewers see the stale entry.
#   * Adding a new entry (loosening) requires reviewer justification and a
#     tracking issue link in the PR description.
#
# Cross-PR drift (an entry going stale because a different PR improved the
# count without tightening) is NOT detected by the per-PR warning above --
# only files in the diff are checked. A scheduled-audit job that walks every
# entry in this file is deferred (see the TODO in
# scripts/ci/check_routed_drc.py::annotate_drift_warning).
#
# Schema:
#   tolerances:
#     <path-relative-to-repo-root>: <max_errors>
#
# Coord-space fix (PR #2753 / issue #2742) -- IMPORTANT:
#   Prior to PR #2753, `PCB.load()` left `Segment.start`/`end`, `Via.position`,
#   and `Zone.polygon`/`Zone.filled_polygons` in sheet-absolute coordinates
#   while `Footprint.position` was already board-relative. For boards with a
#   non-zero `Edge.Cuts` origin, downstream consumers (JLCPCB DRC, edge
#   clearance rule) silently compared mixed coord-spaces and missed an entire
#   class of `clearance_pad_segment` defects: trace endpoints were ~origin
#   distance away from pad positions in coordinate space, so the clearance
#   check always returned a large positive value. The judge confirmed a
#   concrete example on board 05 (OSC_IN trace visibly passes through Y1.2
#   pad with -0.375mm clearance). PR #2753 corrected the invariant, exposing
#   ~210 previously-hidden real violations across boards 03/05/06/07. The
#   floors below were bumped in the same PR to reflect the new ground truth;
#   per-board tracking issues capture the re-routing follow-up.
#
# Tracking:
#   * board 05 -- #2756 (clearance_pad_segment cleanup), #2542 (full clean state)
#   * board 03 -- #2755 (clearance_pad_segment cleanup), coordinates with #2749
#   * board 06 -- #2757 (clearance_pad_segment cleanup), #2672 (impedance), #2677
#   * board 07 -- #2758 (clearance_pad_segment cleanup), #2724/#2726 (impedance)

tolerances:
  # Tightened from 120 -> 53 by PR fixing issue #2781.  The
  # ``_segment_circle_clearance`` rect-pad fix dropped 67 of the 105
  # ``clearance_pad_segment`` reports on this board -- they were
  # false-positive marginal shortfalls produced by the prior
  # "treat rect pad as a disc of radius max(w, h) / 2" approximation
  # along the SHORT axis of TQFP and DDR rectangular pads.  The
  # remaining 38 ``clearance_pad_segment`` reports are real
  # routing defects (most are negative-actual_value cases where
  # SW_OUT routes through U1's TO-263 GND tab and similar -- these
  # are the dominant failure mode tracked in #2756).  Per-rule
  # (post-fix): 38 clearance_pad_segment, 9 clearance_segment_segment,
  # 4 clearance_segment_via, 1 diffpair_clearance_intra,
  # 1 dimension_drill_clearance.  Tracked in #2756 for re-routing,
  # #2542 for full clean state.
  boards/05-bldc-motor-controller/output/bldc_controller_routed.kicad_pcb: 53

  # Board 03 (USB-C joystick) was 22 (post-#2753 coord-space fix), then
  # 19 ``clearance_pad_segment`` after PR #2762 re-route.  All 19
  # were false-positive marginal shortfalls produced by treating the
  # USB-C 0.5 x 1.2 mm rectangular pads as discs of radius 0.6 mm
  # (the disc approximation extended the obstacle 0.35 mm past each
  # pad's short edge into the routing channel between USB SS pairs).
  # With the rect-aware fix from issue #2781, board 03 reached 0
  # errors -- entry was removed.
  #
  # Bumped back to 4 by issue #2940 / PR for #2940's rect-aware
  # full-footprint obstacle marking.  The curator-analysed source on
  # ``main`` was a stale fossil mismatched with the source PCB
  # (re-emitted in PR #2845 with locked USB-C/SWD + B.Cu power pour
  # but the routed file was not regenerated).  The pre-fix re-route
  # produced 9 errors (6 ``clearance_pad_segment`` against J2.5
  # JOY_BTN + 1 ``clearance_pad_via`` at USB_D+ + 2
  # ``diffpair_clearance_intra``).  The #2940 fix eliminates the 6
  # JOY_BTN halo segment errors (the foreign-net through-pad family
  # #2928 targeted but did not fully cover for clearance-halo
  # geometry), leaving 4 residual errors:
  #   * 2 ``clearance_pad_via`` -- USB_D+/D- ladder family (#2919,
  #     separate from #2940; J1.A6 + BTN3/BTN4 cluster).
  #   * 2 ``diffpair_clearance_intra`` -- USB diff-pair within-pair
  #     clearance (#2919 / Epic #2556 Phase 1C, out of scope for
  #     #2940).
  # Exit clause: drop back to 0 once #2919's USB diff-pair family is
  # resolved (the residual 4 errors are all related to the USB-C
  # ladder and orthogonal to #2940's foreign-net through-pad fix).
  #
  # Bumped back to 9 by PR #2924 (#2918 crystal placement to west of
  # MCU).  The west-side Y1 placement narrows the JOY_Y routing
  # channel near J2-5, producing 6 NEW ``clearance_pad_segment``
  # errors at J2-5 (PCB-local (19, 35)).  Plus the existing 2
  # ``diffpair_clearance_intra`` (#2919) and 1
  # ``clearance_segment_via`` JOY_Y/BTN3 minor crosstalk = 9 total.
  #
  # Issue #2943 nudged J2 west 2 mm
  # (``joy_cx``: ``BOARD_ORIGIN_X + 15`` -> ``BOARD_ORIGIN_X + 13``).
  # J2-5 (JOY_BTN) moves from x = 19 to x = 17, opening a clean
  # >5 mm-wide channel between J2-5 and Y1 (at x = 22) for JOY_Y
  # to thread westward from the filter column to J2-4.  The 6
  # ``clearance_pad_segment`` errors at the J2-5 location are
  # eliminated (no errors at PCB-local (19, 35) post-fix).  J2-1
  # (GND) at x = 9 still sits 9 mm inside the PCB west edge.
  # Curator (#2943) explicitly rejected the router-side alternative
  # because PR #2941 tightened the same-component carve-out to
  # reject negative-clearance segments -- those errors are exactly
  # that case, and loosening the router would regress #2941.
  #
  # However, the router (kct route --auto-layers --seed 13)
  # converges on 2-layer routing with 9 different errors after the
  # nudge: 3 ``clearance_pad_segment`` at U1.9 (JOY_X/JOY_Y clipping
  # MCU pads from a new escape path), 1 ``clearance_pad_via`` at
  # J1.A6 (#2919 USB family), 1 ``clearance_pad_via`` at U1.14
  # (BTN3/BTN4), 2 ``diffpair_clearance_intra`` (#2919 USB family),
  # 1 ``clearance_segment_segment`` + 1 ``clearance_segment_via``
  # XTAL crosstalk.  The geometric fix is sound (J2-5 cluster gone)
  # but the router redistributed its conflicts; the net DRC count
  # is unchanged.  This is honest signaling per #2924's exit clause
  # framing: floor stays at 9 because the actual count is 9, even
  # though the underlying defect class shifted.
  #
  # Exit clause for further tightening: a routing improvement (or
  # additional placement nudge to other components like Y1's
  # cap_dy or U1's pin-side filter routing) that drops the
  # post-#2943 count below 9.  Tracked under future follow-up.
  boards/03-usb-joystick/output/usb_joystick_routed.kicad_pcb: 9

  # Held at 31 by issue #2781's rect-pad fix.  Board 06 carries 3
  # legitimate ``clearance_pad_segment`` violations (diff-pair partner
  # pad encroachments at J3/J4 USB3 SS pairs -- tracked under #2660 /
  # #2677), plus 25 impedance + 3 diffpair_clearance_intra.  The
  # rect-pad fix doesn't reduce the count on this board because the
  # 3 pad_segment cases are partner-pad near-misses where the
  # rect-aware bound and the disc bound agree to within an epsilon.
  # Tracked: #2757 (residual diff-pair partner cases), #2672
  # (impedance-width selection), #2677, Epic #2556 Phase 4N (#2660).
  #
  # Bumped 31 -> 32 by PR #2875 / issue #2874: the Python validator's
  # narrowed same-component-ref exclusion (signal-pad-only; plane-net
  # ``net == 0`` pads on a chip now participate in pad-vs-segment
  # validation again -- mirrors the C++ side from #2871 / PR #2873)
  # re-engages a previously-hidden plane-net pad violation on this
  # board.  The +1 error is the validator working as designed: a
  # signal trace rooted at a chip clips one of that chip's plane-net
  # pads -- the same class as the board-04 cluster surfaced by
  # #2871, and exactly the kind of defect the prior over-broad
  # exclusion was concealing.  Parallel to the board-04 floor pattern
  # this PR already exercises (#2871 / #2873 / #2874 share the
  # narrowing rationale).
  #
  # Exit clause: this entry can drop back to 31 once the underlying
  # signal-trace-through-plane-pad violation on board 06 is also
  # fixed.  This rides with the same routing-strategy follow-up the
  # Judge flagged for board 04 (#2834 manufacturing-ready, plus the
  # narrow-channel chain #2842 / #2865 / #2867 / #2869 that needs to
  # compose with validator parity); the board-06 follow-up tracks
  # under the existing #2757 / #2660 cluster.
  boards/06-diffpair-test/output/diffpair_test_routed.kicad_pcb: 32

  # Match-group regression testbench (Epic #2661 Phase 3L, #2724).
  # Held at 70 by issue #2781's rect-pad fix.  Two CI jobs measure
  # this board against this allowlist and they currently disagree
  # on the floor:
  #
  #   * "Routed PCB DRC Check" measures the COMMITTED
  #     ``_routed.kicad_pcb`` artifact and reports 61 (post-fix:
  #     -2 marginal disc-bound positives + 2 newly-surfaced
  #     near-corner cases the disc bound under-reported).
  #
  #   * "Match-Group Routing Regression" RE-ROUTES from source
  #     (``scripts/ci/check_matchgroup_coverage.py
  #     boards/07-matchgroup-test --seed 42``) and then runs DRC.
  #     The seed-42 re-route lands on a partial routing solution
  #     (25/31 nets routed; 6 nets fail pin-access on PADS_OFF_GRID
  #     + clearance-blocked corridors: Net 4 DQ0, Nets 17/18
  #     MIPI_DAT0_*, Nets 23/24 TMDS_D1_*, Net 25 TMDS_D2_P).
  #     The unrouted-net gaps and partial-route DRC sweep produce
  #     70 errors against the rect-aware geometry.
  #
  # The binding gate must accommodate the deterministic re-route,
  # so the floor is 70.  The committed artifact's stricter 61
  # count is preserved as the "best known" floor in the file's
  # history; future routing-yield improvements (Phase 3N, #2726,
  # match-group tuning #2723) will tighten this iteratively as
  # the re-route stops dropping the 6 pin-access nets.  This
  # PR locks in the GEOMETRY fix, not the routing yield.
  # Tracked: Phase 3N (#2726), match-group tuning (#2723).
  boards/07-matchgroup-test/output/matchgroup_test_routed.kicad_pcb: 70

  # Board 04 (STM32F103C8T6 LQFP-48 devboard).  Tightened 60 -> 12 by
  # Issue #2908 (this PR).  The narrowing introduced in #2871 / #2874
  # only kept plane-net pads in the validator when ``pad.net == 0``
  # (the SKIPPED-pour convention); board 04 routes ``+3.3V`` / ``GND``
  # as real nets (so the GND zone can stitch up after routing), so the
  # U2 plane pads retained ``pad.net != 0`` and were silently exempted
  # from the same-component-ref carve-out -- producing 44
  # ``clearance_pad_segment`` errors on U2's west edge cluster
  # (U2.1/8/9/23/24/36 vs NRST/OSC_OUT/SWCLK escapes).
  #
  # Two prior layers were tried and rejected:
  #   * #2890 / PR #2897 -- escape-phase predicate (variant #3).  The
  #     dispatcher never picked the plane-side direction; 0% effect on
  #     the cluster.  Reference branch ``feature/issue-2890`` @
  #     ``f5ee5bde``.
  #   * #2902 / PR #2905 -- grid pre-blocking halo at
  #     ``_apply_narrow_channel_halo``.  Over-broad; regressed boards
  #     02/03/04 (44 -> 58 errors on board 04).  Reference branch
  #     ``feature/issue-2902`` @ ``5de7f0d5``.
  #
  # #2908 fixes the validator layer directly.  Both the Python
  # validator (``grid.py::validate_segment_clearance``) and the C++
  # validator (``cpp/src/grid.cpp::validate_route``) now:
  #   1. Treat plane-net pads as anyone-can-detect obstacles based on
  #      ``pad.net_name`` (``+...V``, ``GND``, ``VCC``, ``VDD``, ...)
  #      regardless of whether the net id is 0 (skipped-pour) or
  #      > 0 (zone-stitched).
  #   2. Use rect-aware geometry (``_rect_segment_centerline_distance``)
  #      to model rectangular SMD pads accurately instead of the
  #      ``radius = max(w, h) / 2`` disc bound.  Mirrors PR #2787's
  #      validate/rules/clearance.py fix.
  #
  # Result on the post-fix routed artifact: 8 errors
  # (2 ``clearance_pad_via`` + 2 ``clearance_segment_segment``
  # + 4 ``clearance_segment_via``).  ``clearance_pad_segment`` drops
  # to **0**.  Floor was held at 12 to give 4-error headroom for
  # routing-yield noise between runs; the next tightening pass can
  # drop this further if the residual seg-via and pad-via violations
  # are stable across re-routes.  Tracked: #2834
  # (manufacturing-ready), #2908 (this PR), #2880 (NRST cluster --
  # closed by this PR).
  #
  # Tightened 12 -> 4 by issue #2951 / this PR.  The routed artifact
  # was regenerated on top of the rect-aware ``_can_place_via``
  # (Issue #2951) and ``set_via_foreign_context`` (Issue #2947)
  # changes; the re-route lands at 4 errors:
  #   * 2 ``clearance_segment_via`` at (26.838, 21.75) -- OSC_IN/NRST
  #     traces touching the OSC_OUT via.
  #   * 2 ``clearance_pad_via`` at (26.838, 21.5)/(26.838, 22.0) --
  #     OSC_OUT in-pad via vs U2.5 (OSC_IN) and U2.7 (NRST).
  # The OSC_OUT cluster is intrinsic to the LQFP-48 0.5mm-pitch
  # geometry: the in-pad nudge searches along the pad's long axis
  # (X for west-edge pads), but the U2.5/U2.7 neighbors share the
  # OSC_OUT pad's X extent (all pads at x=126.8375, fingers extend
  # along X into the chip body), so no long-axis offset can clear
  # them.  The nudge correctly detects this and emits the structured
  # ``In-pad rescue ... violates clearance`` warning before placing
  # at dead-centre as a last resort (PR #2945 "place anyway, defer
  # DRC to the user" semantics).  Exit clause: drop to 0 once the
  # LQFP OSC_OUT escape uses pin-edge fanout (skip the in-pad
  # rescue entirely on neighbor-overlapping pads) or a smaller via
  # tier sized for the 0.5mm pitch.
  #
  # Bumped 4 -> 5 by PR #2997 / issue #2988 (board-04
  # ``generate_design.py`` ``--auto-mfr-tier`` recipe parity fix).
  # The fix routes MORE nets (NRST/SWCLK/SWDIO/BOOT0 -- 9/9 signal
  # nets vs main's 7/12 total), and that net-coverage progress
  # surfaces a +1 DRC error at a different defect site than the
  # existing OSC_OUT cluster:
  #   * 1 ``clearance_segment_via`` at PCB (143.8, 119.7) on B.Cu --
  #     SWDIO trace clips BOOT0 via at -0.075mm (hard geometric
  #     intersection, copper short).
  # This is a regression of #2947's defect class (BOOT0 vias bypassing
  # world-coord clearance) at a new site, likely surfaced by PR
  # #2982's escape-hint seeding routing SWDIO into the BOOT0 escape
  # area.  Tracked under #2998 as the open exit clause.  The +1 DRC
  # error is the COST of progress (more nets routed correctly), not
  # a hidden defect -- documented openly here per the file's
  # exit-clause convention (cf. board-03's 4 -> 9 bump in PR #2924
  # with #2943 + #2919 as exit clauses; same shape).
  #
  # Issue #3020 (PR scaffolding): The 4-quadrant clearance matrix's
  # missing entry (main-router via-vs-foreign-segment post-iteration
  # hook) is now implemented as the symmetric mirror of PR #3006.
  # The hook plumbing matches PR #3006 at all 6 negotiated rip-up
  # sites + the 4 two_phase sites, with the combined seg-via +
  # via-seg violator count promoted into the lex-tuple comparator.
  #
  # Tightened 5 -> 4 by issue #3028 (Part A: DRC-nudge foreign-via
  # destination gate).  The committed routed PCB was regenerated
  # against the post-#3028 pipeline; 3 fresh re-routes on the
  # default seed all converge to 4 errors (9/9 signal nets routed)
  # with the SWDIO/BOOT0 violation at PCB (143.8, 119.7) on B.Cu
  # GONE.  The empirical determination protocol (disable nudge /
  # disable trace optimizer) showed neither pass is uniquely
  # dominant for the residual; the violation does NOT reproduce on
  # a fresh re-route off main as of PR #3027.  Part A is preventive
  # armor: the nudge pass now refuses any candidate position that
  # would clip a foreign-net via, preventing the failure mode from
  # resurfacing on future placement or routing changes.  See the
  # PR description for the disable-A/disable-B matrix evidence.
  #
  # Exit clause: drop to 0 once the OSC_OUT cluster (2 segment-via +
  # 2 pad-via at U2.5/U2.7 on the LQFP-48 0.5mm-pitch geometry) is
  # resolved by pin-edge fanout or a smaller via tier.
  boards/04-stm32-devboard/output/stm32_devboard_routed.kicad_pcb: 4
