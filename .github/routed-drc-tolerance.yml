  # ``CoupledPathfinder`` now atomically reserves USB_D+/USB_D-
  # geometry before any single-net A*, and Phase B's repair
  # pass widens ``min_spacing_cells`` on any pair that still
  # quantises to a clearance violation.
  #
  # Three independent re-runs on seed=42 produce identical
  # output: 17 errors with the same per-rule breakdown.
  #   * 8 clearance_pad_segment -- USB-C connector pad-cluster
  #     near-misses, unchanged in family from PR #2924's signaling.
  #   * 7 connectivity -- partial routes (GND/VCC/VBUS power
  #     pours plus JOY_Y, USB_CC1, USB_CC2, USB_D+); these are the
  #     known 2-layer routing limits documented in
  #     ``route_demo.py`` -- the diff-pair-aware path routes
  #     USB_D-/USB_D+ properly to within partial completion,
  #     where ``route_all()`` previously skipped the coupled
  #     pass entirely.
  #   * 2 via_in_pad -- USB_D+/USB_D- diff-pair landing vias
  #     (e.g. (29.6, 15.5) on U1.29 and (30.4, 15.5) on U1.28);
  #     these are real Phase A artifacts under the strict default
  #     jlcpcb tier.  Resolved on jlcpcb-tier1, which permits
  #     micro-via-in-pad for high-density connector escape.
  #   * 0 diffpair_clearance_intra -- the headline AC for
  #     Issue #3040 is met; Phase B's repair pass eliminates the
  #     residuals the Phase A coupled pass could not avoid.
  #
  # Exit clause: drop back below 17 once (a) the partial-route
  # nets are recovered via the layer-escalation work tracked
  # under the multi-layer routing epic, OR (b) board 03 switches
  # to ``jlcpcb-tier1`` so the 2 via_in_pad reports disappear.
  # The USB-C connector clearance_pad_segment cluster (8 errors)
  # is the same family #2924 tracked and rides with that
  # placement-nudge follow-up.
  #
  # Bumped 17 -> 12 by Issue #3095.  The headline M-D improvements:
  #   * Added F.Cu + B.Cu GND zones (was B.Cu-only) so all 29 GND pads
  #     land on copper instead of being stranded -- dropped 7
  #     connectivity errors to 1.
  #   * Switched DesignRules to grid_resolution=0.05 + fine_pitch_clearance
  #     so the off-grid USB-C connector pads (+/-0.25mm) finally route.
  #   * Disabled the diff-pair pre-pass on USB_D+/USB_D-: the pad-cluster
