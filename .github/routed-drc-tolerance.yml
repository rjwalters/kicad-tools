  #     CoupledPathfinder to widen the pair, so coupled routing
  #     produces 19 ``diffpair_clearance_intra`` overlaps; the
  #     single-net A* path produces just 1 residual.
  #   * Dropped board-wide trace_clearance to 0.15mm so the per-net
  #     router can fit escape segments between the dense MCU/USB-C
