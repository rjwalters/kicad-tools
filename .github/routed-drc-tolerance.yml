# Per-board manufacturer overrides for the CI gate (optional).
#
# Default behaviour: every routed PCB is measured with `kct check --mfr
# jlcpcb`.  Override here when a board's `generate_design.py` deliberately
# targets a different profile.  Adding an entry is a documented design
# choice -- not a way to silence DRC errors -- so it requires reviewer
# sign-off in the PR that introduces the override.
manufacturers:
  # Board-04 routes GND stitching with `--micro-via` (drops to a
  # 0.3/0.15mm via tier) to recover the U2.23 LQFP-48 corner GND pad
  # that the standard 0.6mm via cannot fit.  Micro-vias are part of
  # jlcpcb-tier1's Capability-Plus process, so the CI gate measures
  # this board against the same `--mfr jlcpcb-tier1` profile the
  # design ships against (issue #3033 / PR #3038).
  boards/04-stm32-devboard/output/stm32_devboard_routed.kicad_pcb: jlcpcb-tier1
  # Board-03's J1 USB-C escape lands a standard 0.6/0.3mm via-in-pad on
  # U1-28 (USB_D-) that the strict tier-0 jlcpcb profile forbids but
  # jlcpcb-tier1's Capability-Plus process permits outright -- the same
  # via-in-pad mechanism as board-04 (#3033/#3038).  Measuring board 03
  # against jlcpcb-tier1 drops the 1 `via_in_pad` to 0 with no re-route
  # (the #3128 micro-via fallback is NOT needed; the committed standard
  # via-in-pad clears under tier-1 alone), matching the profile the
  # board now ships against in `boards/03-usb-joystick/generate_design.py`
  # (issue #3150).
  boards/03-usb-joystick/output/usb_joystick_routed.kicad_pcb: jlcpcb-tier1
