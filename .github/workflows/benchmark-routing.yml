name: Routing Benchmark (nightly)

# Issue #2611: nightly regression run for the chorus-test-revA routing
# benchmark.  This workflow is *not* a PR gate — it is intentionally
# scheduled (weekly) and dispatchable, because a single chorus-test
# route is a 30+ minute job and would slow PR CI to a crawl.
#
# What it does:
#   1. Fetches the chorus-test-revA PCB via scripts/ci/fetch_chorus_test.py
#      (skips gracefully when no source is configured).
#   2. Runs `kct benchmark run --cases chorus_test_revA` and saves the
#      result JSON.
#   3. Runs `kct benchmark compare` against the committed baseline at
#      tests/baselines/chorus_test_revA.json.
#   4. Uploads both the result and the comparison report as artifacts.
#
# A regression in `nets_unrouted` (structural floor going above 8) or
# a >10% drop in `nets_fully_routed` versus baseline fails the job.
# See docs/benchmark.md for baseline-update procedure.

on:
  schedule:
    # Weekly: Sundays at 04:00 UTC.  Daily would burn ~3.5 hours/week of
    # CI for diminishing returns on a 30+ min job that doesn't gate PRs.
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Upload the new result as a candidate baseline artifact"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  routing-benchmark:
    name: chorus-test-revA routing benchmark
    runs-on: ubuntu-latest
    # 90 minutes -- chorus-test routes ranged 1500-3200s at HEAD 40f5fbd8
    # (#2604).  The 2x baseline error threshold = 3800s = ~63 min routing,
    # plus dependency install, plus DRC pass, plus comparison.  90 min
    # leaves room without being absurdly long.
    timeout-minutes: 90
    env:
      # Fixture source.  Set as repo secrets so the job can clone the
      # private chorus hardware repo.  When unset, fetch_chorus_test.py
      # skips and the runner reports "case absent" rather than failing.
      CHORUS_TEST_GIT_URL: ${{ secrets.CHORUS_TEST_GIT_URL }}
      CHORUS_TEST_GIT_REF: ${{ secrets.CHORUS_TEST_GIT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Fetch chorus-test-revA fixture
        run: uv run python scripts/ci/fetch_chorus_test.py

      - name: Confirm fixture availability
        id: fixture
        run: |
          if [ -f boards/external/chorus-test-revA/kicad/chorus-test-revA_v18.kicad_pcb ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "::notice::chorus-test-revA fixture present, running benchmark"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::chorus-test-revA fixture not available -- skipping benchmark.  Configure CHORUS_TEST_GIT_URL/CHORUS_TEST_GIT_REF secrets to enable."
          fi

      - name: Run routing benchmark
        if: steps.fixture.outputs.present == 'true'
        run: |
          mkdir -p benchmarks
          uv run kct benchmark run \
            --cases chorus_test_revA \
            --strategies negotiated \
            --output benchmarks/chorus_latest.json \
            --verbose

      - name: Compare against baseline
        if: steps.fixture.outputs.present == 'true'
        run: |
          uv run kct benchmark compare \
            --baseline tests/baselines/chorus_test_revA.json \
            --verbose \
            | tee benchmarks/comparison.txt

      - name: Upload benchmark artifacts
        if: always() && steps.fixture.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: routing-benchmark-${{ github.run_id }}
          path: |
            benchmarks/chorus_latest.json
            benchmarks/comparison.txt
          retention-days: 30

      - name: Job summary
        if: always() && steps.fixture.outputs.present == 'true'
        run: |
          {
            echo "## Routing benchmark summary"
            echo ""
            echo "Case: chorus_test_revA"
            echo "Baseline: tests/baselines/chorus_test_revA.json"
            echo ""
            if [ -f benchmarks/comparison.txt ]; then
              echo '```'
              cat benchmarks/comparison.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
