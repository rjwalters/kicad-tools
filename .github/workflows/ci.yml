name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting
        run: uv run ruff format . --check
        continue-on-error: true

      - name: Lint
        run: uv run ruff check .
        continue-on-error: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src/
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -n auto -o addopts= --benchmark-disable --timeout=60 -m "not slow"
        continue-on-error: true

  cpp-build-check:
    # Issue #2501: catch source/.so drift by rebuilding the C++ extension
    # from a clean checkout and asserting the version-guard reports the
    # backend as available. If anyone changes cpp/ source without bumping
    # ROUTER_CPP_BUILD_VERSION (or vice versa) the import-time guard will
    # fall back to Python and fail this check with an actionable message.
    name: C++ Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Note: deliberately NOT using actions/setup-python@v5 here. That action
      # exports Python_ROOT_DIR=/opt/hostedtoolcache/Python/.../x64, which is
      # sticky for cmake's find_package(Python ...) — even after activating
      # the uv venv with `source .venv/bin/activate`, cmake locates the
      # tool-cache Python (which has no nanobind) instead of the venv's
      # Python with nanobind installed. We rely on uv to manage the Python
      # version (pinned via .python-version / pyproject) and create the venv.

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Python dependencies
        # Pin Python via uv (parity with the other jobs that use
        # actions/setup-python with python-version: "3.12"). uv will install
        # the requested interpreter into its managed cache and create
        # .venv from it.
        run: uv sync --extra dev --python 3.12

      - name: Install nanobind
        run: uv pip install nanobind

      - name: Clean any committed .so artifacts
        run: bash scripts/build-cpp.sh clean

      - name: Build C++ extension from source
        run: |
          source .venv/bin/activate
          # Belt-and-suspenders: explicitly point cmake at the venv Python in
          # case any future runner image starts setting Python_ROOT_DIR.
          export Python_ROOT_DIR="$PWD/.venv"
          unset Python2_ROOT_DIR Python3_ROOT_DIR
          bash scripts/build-cpp.sh build

      - name: Verify version-guard reports backend available
        run: |
          uv run python -c "
          from kicad_tools.router.cpp_backend import (
              is_cpp_available,
              get_cpp_unavailable_reason,
              _REQUIRED_CPP_BUILD_VERSION,
              router_cpp,
          )
          if not is_cpp_available():
              raise SystemExit(
                  f'C++ backend unavailable after clean rebuild: '
                  f'{get_cpp_unavailable_reason()}'
              )
          actual = getattr(router_cpp, 'BUILD_VERSION', None)
          if actual != _REQUIRED_CPP_BUILD_VERSION:
              raise SystemExit(
                  f'BUILD_VERSION mismatch after clean rebuild: '
                  f'compiled={actual!r} required={_REQUIRED_CPP_BUILD_VERSION!r}. '
                  f'Did you forget to bump ROUTER_CPP_BUILD_VERSION in both '
                  f'cpp/include/types.hpp and cpp_backend.py?'
              )
          print(f'C++ backend OK: BUILD_VERSION={actual}')
          "

      - name: Smoke test C++ router
        run: |
          uv run pytest tests/test_router_cpp_backend.py::TestCppBuildVersionGuard -v --no-cov

  kicad-cli-smoke:
    name: kicad-cli Round-trip Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Separate job: a regression gate that PCB files emitted by kicad-tools'
    # writers are loadable by kicad-cli. Two writer bugs (unquoted
    # generator_version, embedded kct_marking subfield) shipped to main and
    # broke every demo board's manufacturing export — this gate prevents
    # that class of regression from re-landing.
    #
    # Uses the official kicad/kicad:10.0 Docker image rather than installing
    # KiCad via apt+PPA. Earlier attempts to install from
    # ppa:kicad/kicad-9.0-releases on ubuntu-latest were unreliable: both
    # api.launchpad.net and ppa.launchpadcontent.net failed back-to-back from
    # the Azure GitHub runner, and apt then silently fell back to KiCad 7
    # from noble/universe — producing confusing "DRC produced no output"
    # errors instead of an attributable infrastructure failure. The official
    # container ships kicad-cli 10 already and is immune to Launchpad outages.
    #
    # The image was bumped from kicad/kicad:9.0 to kicad/kicad:10.0 alongside
    # the source-side PCB format upgrade (version 20240108 → 20260206,
    # generator_version 9.0 → 10.0) in PR #2716. KiCad 9 cannot load files
    # in the new format, so the smoke gate has to track the writer.
    container:
      image: kicad/kicad:10.0
      # Run as root so uv/pip installs go to the system site-packages and
      # actions/checkout can write into $GITHUB_WORKSPACE without permission
      # juggling.
      options: --user 0:0
    defaults:
      run:
        # The kicad/kicad:10.0 image links /bin/sh to dash, which does not
        # support `set -o pipefail`. GitHub Actions invokes each step with
        # `sh -e {0}` by default, so our `set -euo pipefail` headers fail
        # immediately with `set: Illegal option -o pipefail` and exit code 2
        # before any of the actual setup runs. Force bash for all run steps
        # in this job so the pipefail option is recognised.
        shell: bash
    steps:
      # The kicad/kicad image is Ubuntu-based and ships Python 3 + git, but
      # we install ca-certificates and curl defensively in case the image
      # variant we land on is missing one of them (uv's installer needs curl,
      # and HTTPS pulls need ca-certificates).
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git
          # Sanity: the container should have kicad-cli 10 already.
          # Use a permissive regex anchored to either the start of the line
          # or whitespace so we still match if `kicad-cli --version` prefixes
          # its output (e.g., `KiCad 10.0.x`) instead of emitting the bare
          # version string.
          kicad-cli --version | tee /tmp/kicad-cli-version
          grep -qE '(^|[[:space:]])10\.' /tmp/kicad-cli-version || {
            echo "::error::kicad/kicad:10.0 container does not provide kicad-cli 10.x"
            exit 1
          }

      - uses: actions/checkout@v4

      - name: Install uv
        # setup-uv@v4 should work inside the container, but installing via
        # the official one-liner avoids any action-host coupling and keeps
        # the install deterministic across image refreshes.
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # uv installs to ~/.local/bin by default; surface it for later steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run kicad-cli round-trip smoke tests
        run: uv run pytest tests/test_kicad_cli_roundtrip.py -v --no-cov

  routed-pcb-drc-check:
    # Issue #2546: validate every committed `*_routed.kicad_pcb` touched by a
    # PR via `kct check --mfr jlcpcb --errors-only`. Closes the safety-net gap
    # that allowed PR #2538 to ship with 5 DRC errors despite a "0 errors"
    # claim at merge time.
    #
    # The check uses pure-Python DRC (no kicad-cli, no Docker container) so it
    # piggybacks on the same cheap ubuntu-latest + uv pattern as lint/typecheck.
    # File detection is in-job (no `paths:` filter) so the check is safe to
    # mark as a required status check on branch protection -- it always runs
    # and short-circuits to green on PRs that don't touch routed PCBs.
    #
    # A per-board allowlist (`.github/routed-drc-tolerance.yml`) grandfathers
    # in known-broken boards (currently boards 03 and 05) at their CURRENT
    # error counts. The gate is "allowed minus epsilon" -- regressions still
    # fail, but the gate can land before every board reaches 0 errors.
    name: Routed PCB DRC Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base for `git diff origin/main...HEAD` (default
          # fetch-depth: 1 makes the diff fail with "unknown revision").
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Identify modified routed PCBs
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Push to main: diff against the previous commit.
            base="${{ github.event.before }}"
          else
            # Pull request: diff against the merge-base with the target branch.
            base="${{ github.event.pull_request.base.sha }}"
          fi
          # Empty `base` (e.g., very first push to a fresh branch) falls back
          # to origin/main so the gate still has a sensible diff target.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="origin/main"
          fi
          echo "Diffing against base: $base"

          # Newline-separated list of modified routed PCBs. `|| true` keeps
          # the pipeline green when grep finds no matches (empty result is
          # the common case and explicitly handled below).
          mapfile -t files < <(
            git diff --name-only --diff-filter=AM "$base"...HEAD \
              | grep -E '^boards/[^/]+/output/[^/]+_routed\.kicad_pcb$' || true
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No routed PCBs modified -- skipping DRC check."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Modified routed PCBs:"
          printf '  %s\n' "${files[@]}"
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.changed.outputs.files != ''
        run: uv sync --extra dev

      - name: Run kct check on each modified routed PCB
        if: steps.changed.outputs.files != ''
        run: |
          set -euo pipefail
          # Pass each file as a separate arg; the helper handles the
          # allowlist comparison and emits ::error:: annotations.
          mapfile -t files <<< "${{ steps.changed.outputs.files }}"
          # Filter out empty lines (mapfile preserves trailing newline).
          args=()
          for f in "${files[@]}"; do
            [ -n "$f" ] && args+=("$f")
          done
          uv run python scripts/ci/check_routed_drc.py "${args[@]}"

  diffpair-routing-regression:
    # Issue #2660 / Epic #2556 Phase 4N: re-route board 06 (the diff-pair
    # testbench) from scratch on every PR and verify that
    #   (a) the resulting DRC error count is within the allowlist baseline
    #       in .github/routed-drc-tolerance.yml; AND
    #   (b) each of the three diff-pair DRC rules
    #       (diffpair_clearance_intra, diffpair_routing_continuity,
    #       diffpair_length_skew) was actually exercised against an engaged
    #       pair -- i.e., the per-rule counter in the DRC summary is
    #       non-zero for each rule_id.
    #
    # This job is the algorithmic-regression counterpart to the
    # `routed-pcb-drc-check` job above.  That job is diff-driven (only fires
    # when a PR touches a committed *_routed.kicad_pcb file), which catches
    # regressions in *committed* PCB files but does NOT catch regressions in
    # the routing algorithm itself -- e.g., if Phase 2E's coupled engagement
    # accidentally flips `coupled_routing=False`, the diff-driven gate stays
    # green because no committed PCB was touched.  This from-scratch job
    # re-routes board 06 every run so the gate catches algorithmic
    # regressions even when no committed PCB is modified.
    #
    # PR #2552 (merged) introduced the diff-driven precedent this job
    # extends; this is the "always-run" counterpart for diff-pair coverage.
    #
    # Determinism: the gate uses `--seed 42` (Issue #2589 / Phase 3X.2)
    # forwarded into `generate_design.py --seed` so the re-route is
    # reproducible.  Without `--seed` the router uses os.urandom-derived
    # entropy and produces different output run-to-run, which would
    # generate false-positive failures on a loaded CI runner.
    #
    # Parametric over board name (matrix.board): board 03 can be added
    # cheaply once #2589's non-determinism work fully closes and #2513
    # (USB-C blockers) clears.  Today board 03 is omitted because its
    # NetClassRouting declarations do not yet exercise coupled_routing.
    #
    # Allowlist:
    #   .github/routed-drc-tolerance.yml currently has
    #   boards/06-diffpair-test/.../diffpair_test_routed.kicad_pcb: 28
    #   (25x ImpedanceRule per #2672 + 3x diffpair_clearance_intra per
    #   #2677).  The gate respects the allowlist so it doesn't fail
    #   immediately; when #2672 + #2677 land, the allowlist should be
    #   tightened in a separate PR.
    #
    # IMPORTANT (branch-protection note): adding this job to the list of
    # *required* status checks on `main` is a separate repo-admin action.
    # The PR landing this job calls that out explicitly so the human
    # approver can flip the GitHub setting after merge.  Until then the
    # job runs on every PR but is advisory -- its failure does not block
    # the merge button.
    name: Diff-Pair Routing Regression
    runs-on: ubuntu-latest
    # Issue #2660 acceptance criterion #5: wall-clock <= 5 min on
    # ubuntu-latest.  The 10-minute limit here is a safety net for slow
    # runners; if the typical run creeps above 5 minutes, move to a
    # nightly schedule per the epic's runtime guidance.
    timeout-minutes: 10
    # Board 06 (diffpair-test) status (post-#3089):
    #
    #   * LATENCY: #3089 landed a per-pair wall-clock budget plumbed
    #     through ``DifferentialPairConfig.per_pair_timeout`` (default
    #     30.0s for board 06).  The re-route now COMPLETES in ~560s
    #     wall-clock (vs the prior 10-min+ stall on the USB3 SS BGA-49
    #     escape at J3/J4).  See ``boards/06-diffpair-test/generate_design.py``.
    #   * QUALITY: 5-6 of 9 diff pairs still defer to the per-net main
    #     strategy under seed=42 and the resulting routed PCB has ~959
    #     hard DRC violations (vs the committed PCB's 11).  The
    #     committed routed PCB therefore remains the pre-migration
    #     artifact for now.  The job's DRC-count gate fails against
    #     the 32-floor in ``.github/routed-drc-tolerance.yml`` so the
    #     soft-fail stays.
    #
    # Remove this line once the quality follow-up to #3089 lands and
    # the re-routed DRC count drops at or under the (then-tightened)
    # floor.  See the AC-clause-C narrative in
    # ``.github/routed-drc-tolerance.yml`` for the exit conditions.
    #
    # Scoped via a matrix expression so any future board added to the matrix
    # (e.g. board 03 per the comment below) remains a STRICT required check;
    # only the board-06 entry soft-fails.
    continue-on-error: ${{ matrix.board == 'boards/06-diffpair-test' }}
    strategy:
      # Don't abort the matrix on a single board failure -- each board
      # is independent and reviewers want all annotations at once.
      fail-fast: false
      matrix:
        board:
          - boards/06-diffpair-test
        # Future: add boards/03-usb-joystick here once #2589 stabilises
        # its router determinism and #2513 (USB-C blockers) clears.
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Re-route board + check diff-pair coverage
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_diffpair_coverage.py \
            "${{ matrix.board }}" \
            --seed 42

  matchgroup-routing-regression:
    # Issue #2726 / Epic #2661 Phase 3N: re-route board 07 (the
    # N-trace match-group testbench, #2724 Phase 3L) from scratch on
    # every PR and verify that
    #   (a) the resulting DRC error count is within the allowlist baseline
    #       in .github/routed-drc-tolerance.yml; AND
    #   (b) the match_group_length_skew DRC rule (#2702, Phase 2G; producer
    #       wiring #2710 Phase 2.5G) was actually exercised against a
    #       declared group -- i.e., the per-rule counter in the DRC
    #       summary is non-zero for rule_id "match_group_length_skew".
    #
    # This job is a SIBLING to diffpair-routing-regression (board 06),
    # not a matrix-extension.  Per the issue #2726 curator decision
    # (2026-05-11), sibling structure was chosen because:
    #
    #   1. Minimal blast radius -- a match-group regression PR cannot
    #      accidentally break the diff-pair gate and vice versa.
    #   2. The diff-pair coverage script's DIFFPAIR_RULE_IDS tuple is
    #      hardcoded to three rule_ids; the match-group gate asserts a
    #      different (currently single) rule_id.  A dedicated script
    #      (check_matchgroup_coverage.py) is cleaner than parametrising
    #      check_diffpair_coverage.py with a --rules flag.
    #   3. Per-job timeout budgets are independent (each gets a fresh
    #      10-min ceiling -- matrix-extension would share the budget).
    #   4. The existing job name "Diff-Pair Routing Regression" is a
    #      branch-protection check name; renaming requires repo-admin
    #      action.  A sibling job is purely additive to branch protection.
    #
    # This job is the algorithmic-regression counterpart to the
    # routed-pcb-drc-check job above for the match-group rule, mirroring
    # what diffpair-routing-regression does for the diff-pair rules.
    #
    # Determinism: the gate uses `--seed 42` (Issue #2589 / Phase 3X.2)
    # forwarded into `generate_design.py --seed` so the re-route is
    # reproducible.  Without `--seed` the router uses os.urandom-derived
    # entropy and produces different output run-to-run, which would
    # generate false-positive failures on a loaded CI runner.
    #
    # Sidecar: check_matchgroup_coverage.py threads the board's
    # output/net_class_map.json (emitted by generate_design.write_sidecar
    # in Phase 3L scaffolding) into `kct check --net-class-map` per the
    # #2692 pattern.  Without the sidecar the match_group_length_skew
    # rule degrades to a no-op and the assertion-of-engagement check
    # would fail with "rule not exercised".
    #
    # Allowlist:
    #   .github/routed-drc-tolerance.yml currently has
    #   boards/07-matchgroup-test/.../matchgroup_test_routed.kicad_pcb: 80
    #   (55x impedance per #2672 + 4x diffpair_length_skew + 4x
    #   diffpair_routing_continuity + 1x match_group_length_skew, with
    #   ~25% headroom over the empirical 64).  The gate respects the
    #   allowlist so it doesn't fail immediately; the floor will tighten
    #   iteratively as match-group tuning (Phase 3H #2723) lands and
    #   reduces skew.
    #
    # IMPORTANT (branch-protection note): adding this job to the list of
    # *required* status checks on `main` is a separate repo-admin action.
    # The PR landing this job calls that out explicitly so the human
    # approver can flip the GitHub setting after merge.  Until then the
    # job runs on every PR but is advisory -- its failure does not block
    # the merge button.
    name: Match-Group Routing Regression
    runs-on: ubuntu-latest
    # Issue #2660 acceptance criterion #5 (mirrored for #2726): wall-clock
    # <= 5 min on ubuntu-latest.  The 10-minute limit was the original
    # safety net for slow runners; if the typical run creeps above 5
    # minutes, move to a nightly schedule per the epic's runtime guidance.
    #
    # Board 07 routing currently consumes ~9-10 min in CI; PR #3005
    # scope-split (dropping --differential-pairs from the recipe pending
    # the upstream CoupledPathfinder fix) widened this to ~10-12 min
    # because more nets fall through to longer pathfinder paths when the
    # diff-pair pre-pass is skipped.  Reduce back to 10 once #3012 lands
    # and --differential-pairs is re-enabled in
    # boards/07-matchgroup-test/generate_design.py.
    timeout-minutes: 15
    strategy:
      # Don't abort the matrix on a single board failure -- each board
      # is independent and reviewers want all annotations at once.
      fail-fast: false
      matrix:
        board:
          - boards/07-matchgroup-test
        # Future: additional N-trace testbenches (e.g., a board with
        # only the cascade-budget edge case, or a board exercising
        # length_match_reference=pace-car semantics) can be added
        # cheaply once they exist.
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Re-route board + check match-group coverage
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_matchgroup_coverage.py \
            "${{ matrix.board }}" \
            --seed 42

