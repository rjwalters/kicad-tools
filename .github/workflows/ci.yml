name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # Issue #3464: continue-on-error was removed from both steps below.
      # It made the "Lint & Format" check always green regardless of
      # ruff's exit code, hiding ~860 lint errors / ~510 unformatted files
      # on main. The repo-wide format/lint burn-down landed alongside this
      # gate flip (512 files reformatted, ~725 errors auto-fixed, 8 F821
      # defects fixed manually). A residual set of risky rules is baselined
      # in pyproject.toml [tool.ruff.lint] ignore with burn-down tracked by
      # #3663. These steps now GATE: if red, run `uv run ruff format .` and
      # `uv run ruff check . --fix` -- do NOT re-add continue-on-error.
      - name: Check formatting
        run: uv run ruff format . --check

      - name: Lint
        run: uv run ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # Issue #3512: the `Run mypy` step used to carry continue-on-error: true,
      # so the Type Check job was green regardless of mypy's exit code and
      # type rot accumulated invisibly (1512 errors in 269 files on main as of
      # 2026-06-13). Fixing all of them in one PR is infeasible, so this gate
      # mirrors the routed-pcb-drc-check allowlist pattern: a committed
      # baseline (.github/mypy-baseline.txt) records the known errors, and the
      # wrapper script fails the job ONLY on NEW errors beyond the baseline.
      # This catches regressions immediately while the existing debt is burned
      # down. As the baseline shrinks toward 0, this step should eventually be
      # replaced by a bare `uv run mypy src/`. Do NOT re-add continue-on-error
      # or pad the baseline to silence a new error -- fix the type error.
      - name: Run mypy (baseline-gated)
        run: uv run python scripts/ci/check_mypy_baseline.py

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Issue #3436: run inside the official KiCad 10 container (same image
    # as the kicad-cli-smoke job; see its comment for why apt+PPA installs
    # are NOT used). The container provides what dozens of tests need and
    # the bare runner lacks:
    # - /usr/share/kicad/symbols + /usr/share/kicad/footprints at KiCad 10
    #   (ubuntu noble's kicad-symbols/kicad-footprints universe packages
    #   are KiCad-7-era: no Device:Q_NMOS, different LM393 unit structure,
    #   stale footprint pad definitions -- ~40 test failures/errors)
    # - kicad-cli 10 for the DRC/ERC-backed tests (board-02 baseline's
    #   "DRC PASSED" parsing, pipeline ERC/zones steps)
    # All of these failures were previously invisible because the Test
    # step had continue-on-error.
    container:
      image: kicad/kicad:10.0
      # Run as root so installs write system locations and actions/checkout
      # can write $GITHUB_WORKSPACE (mirrors the smoke job).
      options: --user 0:0
    defaults:
      run:
        # The image's /bin/sh is dash; force bash (mirrors the smoke job).
        shell: bash
    steps:
      - name: Ensure container has prerequisites
        # ca-certificates/curl/git for checkout + uv bootstrap; cmake and
        # build-essential for the C++ router backend build below.
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        # Official one-liner instead of setup-uv@v4: avoids action-host
        # coupling inside the container (mirrors the smoke job).
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # Pin the interpreter via uv (parity with the other jobs that use
        # actions/setup-python with python-version: "3.12"); the container
        # image's own Python version is irrelevant.
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        # Issue #3436: `uv sync` does NOT build the native extension (see
        # repo CLAUDE.md "Routing performance: build the C++ backend
        # first"). Without it, router tests fall back to pure Python
        # (10-100x slower) and the --timeout=60 reaper kills tests that
        # pass comfortably with the C++ backend -- another failure class
        # that continue-on-error used to hide. Mirrors the equivalent
        # step in the routing-regression jobs below.
        run: uv run kct build-native

      - name: Run tests
        # Issue #3436: continue-on-error was removed from this step. It
        # made the job green regardless of pytest's exit code, hiding 162
        # failures + 30 errors on main (run 27235563106) and rendering CI,
        # Judges, and the merge queue blind to test regressions. This step
        # now gates: if it is red, fix the tests -- do NOT re-add
        # continue-on-error. Known-broken tests must be xfail'd with a
        # tracking issue instead.
        run: uv run pytest -n auto -o addopts= --benchmark-disable --timeout=60 -m "not slow"

  cpp-build-check:
    # Issue #2501: catch source/.so drift by rebuilding the C++ extension
    # from a clean checkout and asserting the version-guard reports the
    # backend as available. If anyone changes cpp/ source without bumping
    # ROUTER_CPP_BUILD_VERSION (or vice versa) the import-time guard will
    # fall back to Python and fail this check with an actionable message.
    name: C++ Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Note: deliberately NOT using actions/setup-python@v5 here. That action
      # exports Python_ROOT_DIR=/opt/hostedtoolcache/Python/.../x64, which is
      # sticky for cmake's find_package(Python ...) — even after activating
      # the uv venv with `source .venv/bin/activate`, cmake locates the
      # tool-cache Python (which has no nanobind) instead of the venv's
      # Python with nanobind installed. We rely on uv to manage the Python
      # version (pinned via .python-version / pyproject) and create the venv.

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Python dependencies
        # Pin Python via uv (parity with the other jobs that use
        # actions/setup-python with python-version: "3.12"). uv will install
        # the requested interpreter into its managed cache and create
        # .venv from it.
        run: uv sync --frozen --extra dev --python 3.12

      - name: Install nanobind
        run: uv pip install nanobind

      - name: Clean any committed .so artifacts
        run: bash scripts/build-cpp.sh clean

      - name: Build C++ extension from source
        run: |
          source .venv/bin/activate
          # Belt-and-suspenders: explicitly point cmake at the venv Python in
          # case any future runner image starts setting Python_ROOT_DIR.
          export Python_ROOT_DIR="$PWD/.venv"
          unset Python2_ROOT_DIR Python3_ROOT_DIR
          bash scripts/build-cpp.sh build

      - name: Verify version-guard reports backend available
        run: |
          uv run python -c "
          from kicad_tools.router.cpp_backend import (
              is_cpp_available,
              get_cpp_unavailable_reason,
              _REQUIRED_CPP_BUILD_VERSION,
              router_cpp,
          )
          if not is_cpp_available():
              raise SystemExit(
                  f'C++ backend unavailable after clean rebuild: '
                  f'{get_cpp_unavailable_reason()}'
              )
          actual = getattr(router_cpp, 'BUILD_VERSION', None)
          if actual != _REQUIRED_CPP_BUILD_VERSION:
              raise SystemExit(
                  f'BUILD_VERSION mismatch after clean rebuild: '
                  f'compiled={actual!r} required={_REQUIRED_CPP_BUILD_VERSION!r}. '
                  f'Did you forget to bump ROUTER_CPP_BUILD_VERSION in both '
                  f'cpp/include/types.hpp and cpp_backend.py?'
              )
          print(f'C++ backend OK: BUILD_VERSION={actual}')
          "

      - name: Smoke test C++ router
        run: |
          uv run pytest tests/test_router_cpp_backend.py::TestCppBuildVersionGuard -v --no-cov

  kicad-cli-smoke:
    name: kicad-cli Round-trip Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Separate job: a regression gate that PCB files emitted by kicad-tools'
    # writers are loadable by kicad-cli. Two writer bugs (unquoted
    # generator_version, embedded kct_marking subfield) shipped to main and
    # broke every demo board's manufacturing export — this gate prevents
    # that class of regression from re-landing.
    #
    # Uses the official kicad/kicad:10.0 Docker image rather than installing
    # KiCad via apt+PPA. Earlier attempts to install from
    # ppa:kicad/kicad-9.0-releases on ubuntu-latest were unreliable: both
    # api.launchpad.net and ppa.launchpadcontent.net failed back-to-back from
    # the Azure GitHub runner, and apt then silently fell back to KiCad 7
    # from noble/universe — producing confusing "DRC produced no output"
    # errors instead of an attributable infrastructure failure. The official
    # container ships kicad-cli 10 already and is immune to Launchpad outages.
    #
    # The image was bumped from kicad/kicad:9.0 to kicad/kicad:10.0 alongside
    # the source-side PCB format upgrade (version 20240108 → 20260206,
    # generator_version 9.0 → 10.0) in PR #2716. KiCad 9 cannot load files
    # in the new format, so the smoke gate has to track the writer.
    container:
      image: kicad/kicad:10.0
      # Run as root so uv/pip installs go to the system site-packages and
      # actions/checkout can write into $GITHUB_WORKSPACE without permission
      # juggling.
      options: --user 0:0
    defaults:
      run:
        # The kicad/kicad:10.0 image links /bin/sh to dash, which does not
        # support `set -o pipefail`. GitHub Actions invokes each step with
        # `sh -e {0}` by default, so our `set -euo pipefail` headers fail
        # immediately with `set: Illegal option -o pipefail` and exit code 2
        # before any of the actual setup runs. Force bash for all run steps
        # in this job so the pipefail option is recognised.
        shell: bash
    steps:
      # The kicad/kicad image is Ubuntu-based and ships Python 3 + git, but
      # we install ca-certificates and curl defensively in case the image
      # variant we land on is missing one of them (uv's installer needs curl,
      # and HTTPS pulls need ca-certificates).
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git
          # Sanity: the container should have kicad-cli 10 already.
          # Use a permissive regex anchored to either the start of the line
          # or whitespace so we still match if `kicad-cli --version` prefixes
          # its output (e.g., `KiCad 10.0.x`) instead of emitting the bare
          # version string.
          kicad-cli --version | tee /tmp/kicad-cli-version
          grep -qE '(^|[[:space:]])10\.' /tmp/kicad-cli-version || {
            echo "::error::kicad/kicad:10.0 container does not provide kicad-cli 10.x"
            exit 1
          }

      - uses: actions/checkout@v4

      - name: Install uv
        # setup-uv@v4 should work inside the container, but installing via
        # the official one-liner avoids any action-host coupling and keeps
        # the install deterministic across image refreshes.
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # uv installs to ~/.local/bin by default; surface it for later steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run kicad-cli round-trip smoke tests
        run: uv run pytest tests/test_kicad_cli_roundtrip.py -v --no-cov

  routed-pcb-drc-check:
    # Issue #2546: validate every committed `*_routed.kicad_pcb` touched by a
    # PR via `kct check --mfr jlcpcb --errors-only`. Closes the safety-net gap
    # that allowed PR #2538 to ship with 5 DRC errors despite a "0 errors"
    # claim at merge time.
    #
    # The check uses pure-Python DRC (no kicad-cli, no Docker container) so it
    # piggybacks on the same cheap ubuntu-latest + uv pattern as lint/typecheck.
    # File detection is in-job (no `paths:` filter) so the check is safe to
    # mark as a required status check on branch protection -- it always runs
    # and short-circuits to green on PRs that don't touch routed PCBs.
    #
    # A per-board allowlist (`.github/routed-drc-tolerance.yml`) grandfathers
    # in known-broken boards (currently boards 03 and 05) at their CURRENT
    # error counts. The gate is "allowed minus epsilon" -- regressions still
    # fail, but the gate can land before every board reaches 0 errors.
    name: Routed PCB DRC Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base for `git diff origin/main...HEAD` (default
          # fetch-depth: 1 makes the diff fail with "unknown revision").
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Identify modified routed PCBs
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Push to main: diff against the previous commit.
            base="${{ github.event.before }}"
          else
            # Pull request: diff against the merge-base with the target branch.
            base="${{ github.event.pull_request.base.sha }}"
          fi
          # Empty `base` (e.g., very first push to a fresh branch) falls back
          # to origin/main so the gate still has a sensible diff target.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="origin/main"
          fi
          echo "Diffing against base: $base"

          # Newline-separated list of modified routed PCBs. `|| true` keeps
          # the pipeline green when grep finds no matches (empty result is
          # the common case and explicitly handled below).
          mapfile -t files < <(
            git diff --name-only --diff-filter=AM "$base"...HEAD \
              | grep -E '^boards/[^/]+/output/[^/]+_routed\.kicad_pcb$' || true
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No routed PCBs modified -- skipping DRC check."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Modified routed PCBs:"
          printf '  %s\n' "${files[@]}"
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.changed.outputs.files != ''
        run: uv sync --frozen --extra dev

      - name: Run kct check on each modified routed PCB
        if: steps.changed.outputs.files != ''
        run: |
          set -euo pipefail
          # Pass each file as a separate arg; the helper handles the
          # allowlist comparison and emits ::error:: annotations.
          mapfile -t files <<< "${{ steps.changed.outputs.files }}"
          # Filter out empty lines (mapfile preserves trailing newline).
          args=()
          for f in "${files[@]}"; do
            [ -n "$f" ] && args+=("$f")
          done
          uv run python scripts/ci/check_routed_drc.py "${args[@]}"

  diffpair-routing-regression:
    # Issue #2660 / Epic #2556 Phase 4N: re-route board 06 (the diff-pair
    # testbench) from scratch on every PR and verify that
    #   (a) the resulting DRC error count is within the allowlist baseline
    #       in .github/routed-drc-tolerance.yml; AND
    #   (b) each of the three diff-pair DRC rules
    #       (diffpair_clearance_intra, diffpair_routing_continuity,
    #       diffpair_length_skew) was actually exercised against an engaged
    #       pair -- i.e., the per-rule counter in the DRC summary is
    #       non-zero for each rule_id.
    #
    # This job is the algorithmic-regression counterpart to the
    # `routed-pcb-drc-check` job above.  That job is diff-driven (only fires
    # when a PR touches a committed *_routed.kicad_pcb file), which catches
    # regressions in *committed* PCB files but does NOT catch regressions in
    # the routing algorithm itself -- e.g., if Phase 2E's coupled engagement
    # accidentally flips `coupled_routing=False`, the diff-driven gate stays
    # green because no committed PCB was touched.  This from-scratch job
    # re-routes board 06 every run so the gate catches algorithmic
    # regressions even when no committed PCB is modified.
    #
    # PR #2552 (merged) introduced the diff-driven precedent this job
    # extends; this is the "always-run" counterpart for diff-pair coverage.
    #
    # Determinism: the gate uses `--seed 42` (Issue #2589 / Phase 3X.2)
    # forwarded into `generate_design.py --seed` so the re-route is
    # reproducible.  Without `--seed` the router uses os.urandom-derived
    # entropy and produces different output run-to-run, which would
    # generate false-positive failures on a loaded CI runner.
    #
    # Parametric over board name (matrix.board): board 03 can be added
    # cheaply once #2589's non-determinism work fully closes and #2513
    # (USB-C blockers) clears.  Today board 03 is omitted because its
    # NetClassRouting declarations do not yet exercise coupled_routing.
    #
    # Allowlist:
    #   .github/routed-drc-tolerance.yml currently has
    #   boards/06-diffpair-test/.../diffpair_test_routed.kicad_pcb: 28
    #   (25x ImpedanceRule per #2672 + 3x diffpair_clearance_intra per
    #   #2677).  The gate respects the allowlist so it doesn't fail
    #   immediately; when #2672 + #2677 land, the allowlist should be
    #   tightened in a separate PR.
    #
    # IMPORTANT (branch-protection note): adding this job to the list of
    # *required* status checks on `main` is a separate repo-admin action.
    # The PR landing this job calls that out explicitly so the human
    # approver can flip the GitHub setting after merge.  Until then the
    # job runs on every PR but is advisory -- its failure does not block
    # the merge button.
    name: Diff-Pair Routing Regression
    runs-on: ubuntu-latest
    # Issue #3509: run inside the official KiCad 10 container (same image
    # as the test + kicad-cli-smoke jobs).  The board 06 recipe's pour
    # pipeline (zone fill -> stitch -> pour-connectivity repair -> re-fill
    # -> copper-union audit) shells out to ``kct zones fill``, which is
    # backed by kicad-cli.  On the bare ubuntu-latest runner kicad-cli
    # does not exist, so EVERY fill invocation failed with rc=1
    # ("kicad-cli not found"), all 5 pour zones stayed zero-fill, and the
    # repair loop was left trying to do a copper plane's job with discrete
    # vias/bridges -- the non-converging "FAIL while the gate is green"
    # trap from PR #3506's run 27343006197.  The container provides
    # kicad-cli 10 so the fills actually run, matching the local artifact-
    # refresh environment.  The gate also asserts the pour audit verdict
    # now (see scripts/ci/check_diffpair_coverage.py + the board recipe's
    # REQUIRE_POUR_CONNECTIVITY contract), so a future fill regression
    # fails the job instead of rotting in the log.
    container:
      image: kicad/kicad:10.0
      # Run as root so installs write system locations and actions/checkout
      # can write $GITHUB_WORKSPACE (mirrors the test + smoke jobs).
      options: --user 0:0
    defaults:
      run:
        # The image's /bin/sh is dash; force bash (mirrors the test job).
        shell: bash
    # Issue #2660 acceptance criterion #5: wall-clock <= 5 min on
    # ubuntu-latest.  Originally a 10-minute safety-net ceiling, bumped
    # to 15 minutes per PR #3141 Judge feedback (2026-05-27):
    # board 06's USB3 SS BGA-49 escape runs through CoupledPathfinder,
    # which has NO C++ backend (the C++ extension only covers per-net
    # A*, not the diff-pair coupled-routing path), so the ~2-3 min C++
    # build + ~9-10 min Python coupled routing exceeds the prior 10-min
    # ceiling.  If the typical run creeps above 5 minutes, move to a
    # nightly schedule per the epic's runtime guidance.
    #
    # Issue #3413 (phase 3): 15 -> 20 min.  The run pays for the
    # overflow-silent rescue work inside the negotiated loop plus a
    # bounded (<= 90s) post-route correction pass on the timed-out
    # exit.  Local M-series wall is ~17 min; the 2-core ubuntu runner
    # needs the extra headroom.  Also closes #3477 (sub-minute margin
    # under the prior 15-min ceiling; option 1 -- ceiling bump -- was
    # its preferred fix).
    #
    # Issue #3413 (phases 4-6): the recipe's negotiated budget is now
    # 360s (the phase-3 A/B that rejected 360s pre-dates the
    # tightly-coupled width re-solve; see the budget rationale in
    # boards/06-diffpair-test/generate_design.py).
    #
    # Issue #3413 (phases 4-6, ceiling re-calibration): 20 -> 30 min.
    # The phases-4-6 prediction that "total wall does not grow" was
    # falsified by the first CI run on the new recipe (PR #3506, run
    # 27341578234, killed at the 20-min ceiling).  CI-empirical
    # arithmetic on the 2-core ubuntu runner:
    #
    #   setup + board generation            ~0:45
    #   coupled diff-pair pre-phase          6:00  (9 pairs x 60s
    #                                              per-pair budget,
    #                                              all deferred)
    #   negotiated loop                      6:05  (360s budget; banked
    #                                              21/21 overflow=2 and
    #                                              restored it)
    #   post-route pipeline                 >7:15 when killed
    #     (optimize + nudge + solo pair repair + zone gen + first fill
    #      + stitch + up to 3 rounds of pour repair / re-fill /
    #      copper-union audit + DRC + mfg export + gate-side checks)
    #
    # The pre-#3413-phase-4 recipe's post-route tail took ~3.7 min on
    # CI (main runs 27341166410 / 27330851929: 14m22s / 14m29s total);
    # the new fill/repair/audit rounds roughly double-to-triple it, so
    # the typical run lands ~22-25 min.  All in-loop work is internally
    # budgeted (per-pair 60s, negotiated 360s, repair loop capped at 3
    # rounds), so 30 min gives ~20-30% headroom over the worst expected
    # wall without masking a genuine hang.
    #
    # Issue #3509 re-measure note: moving into the kicad/kicad:10.0
    # container adds ~1-2 min (image pull + apt prerequisites) but the
    # zone fills now succeed, so the pour-repair loop converges instead
    # of grinding its full round budget against unfillable zero-fill
    # zones (the pre-#3509 runs burned ~2.2 min on 3 futile rounds).
    # Prior green run wall: 20m42s (run 27343006197); ceiling kept at
    # 30 min.
    timeout-minutes: 30
    # Board 06 (diffpair-test) status (M-F closure, Issue #3097):
    #
    #   * LATENCY: #3089 landed a per-pair wall-clock budget plumbed
    #     through ``DifferentialPairConfig.per_pair_timeout`` (now
    #     60.0s for board 06, see #3144 for why the budget was doubled).
    #     The re-route COMPLETES in ~9-12 min wall-clock (vs the prior
    #     10-min+ stall on the USB3 SS BGA-49 escape at J3/J4).  See
    #     ``boards/06-diffpair-test/generate_design.py``.
    #   * QUALITY: #3115 (PR #3140) landed a partner-aware A* heuristic
    #     for ``CoupledPathfinder._heuristic`` that eliminated the
    #     817-error ``diffpair_clearance_intra`` cluster from the
    #     legacy Manhattan-sum heuristic.
    #   * DETERMINISM: #3144 fixed the A* tie-break defect in
    #     ``CoupledNode`` / ``AStarNode`` (Python + C++) and switched
    #     board 06 from a wall-clock budget classifier to an iteration
    #     budget classifier, eliminating the timing-dependent
    #     coupled-vs-deferred bucket drift that previously caused
    #     CI runs to vary 35-43 errors on the same input + seed.
    #   * RESIDUAL: 1 ``diffpair_clearance_intra`` on USB2_D+/USB2_D-
    #     at the USB-C source footprint is a STRUCTURAL geometric
    #     constraint (the A6/B6 D+ pads and A7/B7 D- pads form
    #     mandatory diagonal crossovers due to USB-C reversibility
    #     pad mirroring).  No spacing-widening at any grid resolution
    #     can resolve it; it is documented as an allowlist residual
    #     in ``.github/routed-drc-tolerance.yml``.
    #
    # Issue #3144: strict M-F gate is now re-enabled (soft-fail
    # removed).  Two changes made the strict gate viable:
    #
    #   1. A* tie-break fix in Python ``CoupledNode`` and C++
    #      ``AStarNode`` adds a monotonic insertion counter as the
    #      secondary sort key, so equal-f_score nodes pop in a
    #      deterministic, insertion-order-preserving order.
    #   2. Per-pair iteration budget (new
    #      ``DifferentialPairConfig.per_pair_max_iterations``) replaces
    #      the wall-clock budget as the primary classifier of which
    #      pairs the coupled pathfinder gives up on.  The iteration
    #      budget is independent of CPU speed, so a slow 2-core CI
    #      runner classifies the same pairs as a fast multi-core
    #      development machine.
    strategy:
      # Don't abort the matrix on a single board failure -- each board
      # is independent and reviewers want all annotations at once.
      fail-fast: false
      matrix:
        board:
          - boards/06-diffpair-test
        # Future: add boards/03-usb-joystick here once #2589 stabilises
        # its router determinism and #2513 (USB-C blockers) clears.
    steps:
      - name: Ensure container has prerequisites
        # ca-certificates/curl/git for checkout + uv bootstrap; cmake and
        # build-essential for the C++ router backend build below.  The
        # ``kicad-cli --version`` probe makes a missing/broken kicad-cli
        # fail THIS step with an attributable error instead of surfacing
        # later as zero-fill pour zones (Issue #3509).
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        # Official one-liner instead of setup-uv@v4: avoids action-host
        # coupling inside the container (mirrors the test + smoke jobs).
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # Pin the interpreter via uv (parity with the sibling jobs that use
        # actions/setup-python with python-version: "3.12"); the container
        # image's own Python version is irrelevant.
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        # `uv sync` does NOT build the native extension (see repo CLAUDE.md
        # "Routing performance: build the C++ backend first").  Without
        # this step board 06 routing falls back to pure Python which is
        # 10-100x slower and reliably blows past the 10-min job timeout
        # (Issue #3097 / PR #3141 Judge feedback, 2026-05-25).
        run: uv run kct build-native

      - name: Re-route board + check diff-pair coverage
        # Issue #3144: pin PYTHONHASHSEED so the Python interpreter's
        # ``hash()`` returns the same values run-to-run.  CPython
        # default behaviour is to randomise string hashes on every
        # startup, which causes ``set[str]`` / ``dict[str, ...]``
        # iteration order to vary -- a subtle non-determinism source
        # in any upstream code path that iterates over a string-keyed
        # collection.  The Phase 1 code-walk did not find such a path
        # in the per-pair router itself, but pinning the seed is a
        # cheap, broadly applicable belt-and-braces measure.  ``42``
        # matches the ``--seed`` argument for consistency.
        #
        # PYTHONUNBUFFERED: stdout to the Actions log pipe is
        # block-buffered (8 KiB) by default, so when run 27341578234
        # hit the job ceiling mid-post-route the log went silent for
        # 7+ minutes after "Restoring iteration N state" -- every
        # post-route step's output was sitting in the buffer (or in a
        # ``capture_output=True`` child) when the runner killed the
        # process.  Unbuffered output makes the next timeout
        # attributable to a specific pipeline step.
        env:
          PYTHONHASHSEED: "42"
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_diffpair_coverage.py \
            "${{ matrix.board }}" \
            --seed 42

  matchgroup-routing-regression:
    # Issue #2726 / Epic #2661 Phase 3N: re-route board 07 (the
    # N-trace match-group testbench, #2724 Phase 3L) from scratch on
    # every PR and verify that
    #   (a) the resulting DRC error count is within the allowlist baseline
    #       in .github/routed-drc-tolerance.yml; AND
    #   (b) the match_group_length_skew DRC rule (#2702, Phase 2G; producer
    #       wiring #2710 Phase 2.5G) was actually exercised against a
    #       declared group -- i.e., the per-rule counter in the DRC
    #       summary is non-zero for rule_id "match_group_length_skew".
    #
    # This job is a SIBLING to diffpair-routing-regression (board 06),
    # not a matrix-extension.  Per the issue #2726 curator decision
    # (2026-05-11), sibling structure was chosen because:
    #
    #   1. Minimal blast radius -- a match-group regression PR cannot
    #      accidentally break the diff-pair gate and vice versa.
    #   2. The diff-pair coverage script's DIFFPAIR_RULE_IDS tuple is
    #      hardcoded to three rule_ids; the match-group gate asserts a
    #      different (currently single) rule_id.  A dedicated script
    #      (check_matchgroup_coverage.py) is cleaner than parametrising
    #      check_diffpair_coverage.py with a --rules flag.
    #   3. Per-job timeout budgets are independent (each gets a fresh
    #      10-min ceiling -- matrix-extension would share the budget).
    #   4. The existing job name "Diff-Pair Routing Regression" is a
    #      branch-protection check name; renaming requires repo-admin
    #      action.  A sibling job is purely additive to branch protection.
    #
    # This job is the algorithmic-regression counterpart to the
    # routed-pcb-drc-check job above for the match-group rule, mirroring
    # what diffpair-routing-regression does for the diff-pair rules.
    #
    # Determinism: the gate uses `--seed 42` (Issue #2589 / Phase 3X.2)
    # forwarded into `generate_design.py --seed` so the re-route is
    # reproducible.  Without `--seed` the router uses os.urandom-derived
    # entropy and produces different output run-to-run, which would
    # generate false-positive failures on a loaded CI runner.
    #
    # Sidecar: check_matchgroup_coverage.py threads the board's
    # output/net_class_map.json (emitted by generate_design.write_sidecar
    # in Phase 3L scaffolding) into `kct check --net-class-map` per the
    # #2692 pattern.  Without the sidecar the match_group_length_skew
    # rule degrades to a no-op and the assertion-of-engagement check
    # would fail with "rule not exercised".
    #
    # Allowlist:
    #   .github/routed-drc-tolerance.yml currently has
    #   boards/07-matchgroup-test/.../matchgroup_test_routed.kicad_pcb: 80
    #   (55x impedance per #2672 + 4x diffpair_length_skew + 4x
    #   diffpair_routing_continuity + 1x match_group_length_skew, with
    #   ~25% headroom over the empirical 64).  The gate respects the
    #   allowlist so it doesn't fail immediately; the floor will tighten
    #   iteratively as match-group tuning (Phase 3H #2723) lands and
    #   reduces skew.
    #
    # IMPORTANT (branch-protection note): adding this job to the list of
    # *required* status checks on `main` is a separate repo-admin action.
    # The PR landing this job calls that out explicitly so the human
    # approver can flip the GitHub setting after merge.  Until then the
    # job runs on every PR but is advisory -- its failure does not block
    # the merge button.
    name: Match-Group Routing Regression
    runs-on: ubuntu-latest
    # Issue #3617 (sibling of board 06's #3509): run inside the official
    # KiCad 10 container (same image as the test + kicad-cli-smoke +
    # diffpair-routing-regression jobs).  The board 07 recipe's pour
    # pipeline (zone fill -> stitch -> pour-connectivity repair -> re-fill
    # -> copper-union audit) shells out to ``kct zones fill``, which is
    # backed by kicad-cli.  On the bare ubuntu-latest runner kicad-cli does
    # not exist, so every fill invocation fails and the pour zones stay
    # zero-fill -- the same "dead pour" trap board 06 closed in PR #3615.
    # The container provides kicad-cli 10 so the fills actually run,
    # matching the local artifact-refresh environment.  The gate now
    # asserts the pour audit verdict (see scripts/ci/check_matchgroup_coverage.py
    # + the board recipe's REQUIRE_POUR_CONNECTIVITY contract), so a future
    # fill regression fails the job instead of rotting in the log.
    container:
      image: kicad/kicad:10.0
      # Run as root so installs write system locations and actions/checkout
      # can write $GITHUB_WORKSPACE (mirrors the test + smoke jobs).
      options: --user 0:0
    defaults:
      run:
        # The image's /bin/sh is dash; force bash (mirrors the test job).
        shell: bash
    # Board 07 routing consumes ~10-12 min in CI; the prior bare-runner
    # green wall was ~12-13 min (run 27433067590).  Issue #3617 re-measure:
    # moving into the kicad/kicad:10.0 container adds ~1-2 min (image pull +
    # apt prerequisites) and the recipe now performs real zone fills +
    # pour-repair rounds, so the prior 15-min ceiling leaves no headroom.
    # Bumped 15 -> 20 to match the container + fill re-measure (same value
    # PR #3625 sets for issue #3620's container move of this job).
    timeout-minutes: 20
    # Issue #3146 closure: the matrix-scoped soft-fail
    # (``continue-on-error: ${{ matrix.board == 'boards/07-matchgroup-test' }}``)
    # that PR #3145 installed pending matchgroup-routing
    # determinism work has been removed.  Determinism for board 07
    # rests on three coordinated pieces:
    #   1. C++ + Python A* tie-break:
    #      ``AStarNode::operator>`` (``router/cpp/include/types.hpp``)
    #      and ``AStarNode.__lt__`` (``router/pathfinder.py``) compare
    #      on ``(f_score, seq)`` where ``seq`` is a monotonic
    #      insertion counter assigned at heap-push time.  This was
    #      landed by PR #3192 (Issue #3144 -- CoupledPathfinder /
    #      board 06) and is the upstream determinism guarantee that
    #      also makes board 07's negotiated A* main pass stable.
    #      This PR (closing #3146) inherits that fix and adds the
    #      board-07-side closure pieces below; it does not re-touch
    #      the comparator.
    #   2. PYTHONHASHSEED pinned to "42" in
    #      ``boards/07-matchgroup-test/generate_design.py`` when
    #      it spawns the ``kct route`` subprocess AND at the workflow
    #      step env below, eliminating string-keyed dict/set iteration
    #      drift between runners.
    #   3. CI step below builds the C++ backend (matching the
    #      diffpair-routing-regression job) so board 07 routes
    #      against the same fast path locally and in CI -- the
    #      10-100x slowdown of the pure-Python fallback was a major
    #      contributor to wall-clock budget classification drift.
    strategy:
      # Don't abort the matrix on a single board failure -- each board
      # is independent and reviewers want all annotations at once.
      fail-fast: false
      matrix:
        board:
          - boards/07-matchgroup-test
        # Future: additional N-trace testbenches (e.g., a board with
        # only the cascade-budget edge case, or a board exercising
        # length_match_reference=pace-car semantics) can be added
        # cheaply once they exist.
    steps:
      - name: Ensure container has prerequisites
        # ca-certificates/curl/git for checkout + uv bootstrap; cmake and
        # build-essential for the C++ router backend build below.  The
        # ``kicad-cli --version`` probe makes a missing/broken kicad-cli
        # fail THIS step with an attributable error instead of surfacing
        # later as zero-fill pour zones (Issue #3617).
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        # Official one-liner instead of setup-uv@v4: avoids action-host
        # coupling inside the container (mirrors the test + smoke +
        # diffpair-routing-regression jobs).
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # Pin the interpreter via uv (parity with the sibling jobs that use
        # actions/setup-python with python-version: "3.12"); the container
        # image's own Python version is irrelevant.
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        # Issue #3146: ``uv sync`` does NOT build the native extension
        # (see repo CLAUDE.md "Routing performance: build the C++ backend
        # first").  Without this step board 07 routing falls back to pure
        # Python which is 10-100x slower; with a 2-core runner and 600s
        # outer / 30s per-net budgets, the slowdown was the dominant source
        # of the cross-platform DRC variance reported in PR #3145 (27 local
        # vs 48 CI).  Mirrors the equivalent step in the
        # diffpair-routing-regression job above.
        run: uv run kct build-native

      - name: Re-route board + check match-group coverage
        # Issue #3146: ``PYTHONHASHSEED`` pinned at the workflow-step
        # level so any string-keyed dict/set iteration in the outer
        # ``check_matchgroup_coverage.py`` (and in the
        # ``generate_design.py`` subprocess it spawns) is reproducible
        # across runner environments.  The board 07 ``generate_design.py``
        # also re-pins it on its own ``kct route`` subprocess for the
        # local-CLI case, but pinning here covers the CI path end-to-end.
        # PYTHONUNBUFFERED makes a timeout attributable to a specific
        # pipeline step instead of going silent in a block-buffered pipe
        # (the diffpair job's #3413 lesson).
        env:
          PYTHONHASHSEED: "42"
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_matchgroup_coverage.py \
            "${{ matrix.board }}" \
            --seed 42

  board-00-end-to-end:
    # Issue #3751: regenerate board 00 ("simple-led", the canonical
    # "Hello World" fixture) from its recipe (boards/00-simple-led/
    # generate_design.py) on every PR and assert that the resulting
    # artifacts cross the manufacturability bar.  This is the PR-time
    # complement to ``tests/test_board_00_simple_led.py::TestBoard00SimpleLed``
    # (which is @pytest.mark.slow and only runs nightly via
    # ``slow-tests.yml``) and the recipe-side regression gate that
    # ``routed-pcb-drc-check`` cannot provide -- the diff-driven DRC
    # gate only fires when a PR touches the committed *_routed.kicad_pcb,
    # so a recipe bug that produces a wrong-but-still-DRC-clean PCB (the
    # exact failure mode of #3747's D1 polarity bug) goes undetected.
    #
    # What the gate does:
    #   1. Re-run ``generate_design.py`` against a clean tmp directory.
    #   2. Run ``kct check`` on the routed PCB; require ``Overall: PASSED``
    #      (DRC + ERC + LVS + Manifest sub-checks all PASSED -- the meta
    #      contract from #3750).
    #   3. Re-emit board.json via ``kct board-metrics`` against the regen
    #      output and assert ``status: ok``, ``drc_violations: 0``,
    #      ``lvs_clean: true`` -- the public contract the demo gallery
    #      (#3749) consumes.
    #
    # The gate intentionally does NOT diff the regenerated artifacts
    # against the committed ``output/`` tree (the original AC's step 7):
    # copper UUIDs, segment ordering, and generator timestamps are
    # nondeterministic, so a naive byte-diff would false-positive on
    # every PR.  Netlist equivalence is already covered by LVS; component
    # placement and routing topology need a semantic comparator that is
    # out of scope for this issue.
    #
    # Runner setup mirrors the ``test`` job: official kicad/kicad:10.0
    # container so kicad-cli is present (the recipe's ``run_erc()`` and
    # the meta ``ERC`` sub-check both shell out to kicad-cli; on a bare
    # ubuntu-latest runner the ERC step is silently skipped and the gate
    # defeats itself).  The C++ backend build is required per CLAUDE.md
    # ("Routing performance: build the C++ backend first") -- without it
    # the router falls back to pure Python (10-100x slower) and risks
    # missing the 15-minute ceiling.
    #
    # IMPORTANT (branch-protection note): adding this job to the list of
    # *required* status checks on ``main`` is a separate repo-admin
    # action.  The PR landing this job calls that out explicitly so the
    # human approver can flip the GitHub setting after merge.  Until then
    # the job runs on every PR but is advisory -- its failure does not
    # block the merge button.  Same pattern as
    # ``diffpair-routing-regression`` and ``matchgroup-routing-regression``.
    name: Board 00 End-to-End
    runs-on: ubuntu-latest
    # The recipe is ~30 seconds locally (1 signal net + 2 pour nets),
    # the C++ backend build is ~2 min, ``kct export`` + ``kct check`` +
    # ``kct board-metrics`` add ~30s total, and the gate-side asserter
    # is sub-second.  15 min leaves >2x headroom on a slow 2-core
    # ubuntu runner without masking a hang.
    timeout-minutes: 15
    container:
      image: kicad/kicad:10.0
      # Run as root so installs write system locations and actions/checkout
      # can write $GITHUB_WORKSPACE (mirrors the test + smoke jobs).
      options: --user 0:0
    defaults:
      run:
        # The image's /bin/sh is dash; force bash (mirrors the test job).
        shell: bash
    steps:
      - name: Ensure container has prerequisites
        # ca-certificates/curl/git for checkout + uv bootstrap; cmake and
        # build-essential for the C++ router backend build below.  The
        # ``kicad-cli --version`` probe makes a missing/broken kicad-cli
        # fail THIS step with an attributable error instead of surfacing
        # later as a silently-skipped ERC sub-check.
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        # Official one-liner instead of setup-uv@v4: avoids action-host
        # coupling inside the container (mirrors the test + smoke jobs).
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        # Pin the interpreter via uv (parity with the sibling jobs that
        # use actions/setup-python with python-version: "3.12"); the
        # container image's own Python version is irrelevant.  ``--extra
        # dev`` is required because ``kct check`` imports ``shapely`` for
        # the geometry-based DRC rules (see the [project.optional-dependencies]
        # dev block in pyproject.toml for the ``shapely>=2.0`` pin).
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        # ``uv sync`` does NOT build the native extension (see repo
        # CLAUDE.md "Routing performance: build the C++ backend first").
        # Without this step the recipe's routing step falls back to pure
        # Python which is 10-100x slower.
        run: uv run kct build-native

      - name: Regenerate board 00 from recipe (clean tmp directory)
        # The recipe's main() accepts an optional output directory as
        # argv[1] (boards/00-simple-led/generate_design.py:944-947); we
        # point it at a tmp directory so the gate never touches the
        # committed boards/00-simple-led/output/ tree.  Exits non-zero
        # if any of ERC/DRC/LVS/MFG fail OR run_lvs() raises
        # BoardNetlistMismatch -- the polarity-class regression the gate
        # is designed to catch.
        run: |
          set -euo pipefail
          rm -rf /tmp/board00-ci
          mkdir -p /tmp/board00-ci
          uv run python boards/00-simple-led/generate_design.py /tmp/board00-ci

      - name: Assert kct check Overall PASSED on regenerated routed PCB
        # The meta sub-check pattern from #3750: DRC + ERC + LVS +
        # Manifest must ALL be PASSED for ``Overall: PASSED`` and exit
        # 0.  No ``--allow-incomplete`` -- the recipe just wrote
        # manufacturing/manifest.json, so Manifest is fresh.  ``tee``
        # surfaces the full output in the log AND lets the grep gate
        # the build on the exact "Overall: PASSED" line (defence in
        # depth against future verdict-string renames).
        run: |
          set -euo pipefail
          uv run kct check /tmp/board00-ci/simple_led_routed.kicad_pcb \
            | tee /tmp/board00-ci/check.out
          grep -qE '^Overall:[[:space:]]+PASSED' /tmp/board00-ci/check.out

      - name: Emit board.json via kct board-metrics
        # board.json is NOT written by the recipe -- it's the public
        # data contract emitted by the ``kct board-metrics`` aggregator
        # (src/kicad_tools/cli/board_metrics_cmd.py) that the demo
        # gallery (#3749) consumes.  The command expects a board-layout
        # directory in the standard ``<board_dir>/output/`` shape, so
        # we mirror the tmp regen into that shape and point the command
        # at it.  This validates the same contract a downstream demo-
        # site build would.
        run: |
          set -euo pipefail
          rm -rf /tmp/board00-staging
          mkdir -p /tmp/board00-staging/00-simple-led/output
          cp -r /tmp/board00-ci/. /tmp/board00-staging/00-simple-led/output/
          uv run kct board-metrics /tmp/board00-staging/00-simple-led

      - name: Assert artifacts + lvs.json + board.json fields
        # The gate-side asserter: presence of every required artifact,
        # lvs.json clean=true, and board.json status=ok / drc_violations=0
        # / lvs_clean=true.  Sibling of scripts/ci/check_routed_drc.py;
        # see its docstring for the GitHub-Actions annotation contract.
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_board_00_e2e.py \
            /tmp/board00-staging/00-simple-led

  board-01-end-to-end:
    # Issue #3762: same end-to-end gate as ``board-00-end-to-end``, applied
    # to board 01 ("voltage-divider").  Board 01 is verified clean on both
    # the copper-extracted and label-based LVS comparators, so its recipe
    # now runs ``write_lvs_report(..., require_clean=True)`` and emits
    # ``output/lvs.json``.  This job regenerates the board, asserts
    # ``kct check`` Overall PASSED, emits board.json, and asserts
    # lvs.json clean=true + board.json lvs_clean=true via the generalized
    # ``scripts/ci/check_board_00_e2e.py`` asserter (parametrized with
    # ``--stem voltage_divider``).  See the board-00 job above for the
    # full rationale on container choice, the C++ backend build, and the
    # advisory (non-required-check) status until a repo admin flips the
    # branch-protection setting.
    name: Board 01 End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: kicad/kicad:10.0
      options: --user 0:0
    defaults:
      run:
        shell: bash
    steps:
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        run: uv run kct build-native

      - name: Regenerate board 01 from recipe (clean tmp directory)
        # The recipe exits non-zero if ERC/DRC/LVS fail OR write_lvs_report
        # raises BoardNetlistMismatch -- board 01 hard-gates on both
        # comparators (require_clean=True).
        run: |
          set -euo pipefail
          rm -rf /tmp/board01-ci
          mkdir -p /tmp/board01-ci
          uv run python boards/01-voltage-divider/generate_design.py /tmp/board01-ci

      - name: Assert kct check Overall PASSED on regenerated routed PCB
        run: |
          set -euo pipefail
          uv run kct check /tmp/board01-ci/voltage_divider_routed.kicad_pcb \
            | tee /tmp/board01-ci/check.out
          grep -qE '^Overall:[[:space:]]+PASSED' /tmp/board01-ci/check.out

      - name: Emit board.json via kct board-metrics
        run: |
          set -euo pipefail
          rm -rf /tmp/board01-staging
          mkdir -p /tmp/board01-staging/01-voltage-divider/output
          cp -r /tmp/board01-ci/. /tmp/board01-staging/01-voltage-divider/output/
          uv run kct board-metrics /tmp/board01-staging/01-voltage-divider

      - name: Assert artifacts + lvs.json + board.json fields
        # Reuse the generalized board-00 asserter with --stem so it derives
        # board 01's artifact names (voltage_divider*.kicad_{sch,pcb}).
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_board_00_e2e.py \
            --stem voltage_divider \
            /tmp/board01-staging/01-voltage-divider

  board-02-end-to-end:
    # Issue #3783: same full end-to-end gate as ``board-00-end-to-end`` /
    # ``board-01-end-to-end``, applied to board 02 ("charlieplex-led").
    # This job was deferred in #3779 because a fresh regen produced a
    # spurious copper short (NODE_B<->NODE_C) — a layer-agnostic copper-LVS
    # extractor false-positive on a legal via-less F.Cu/B.Cu crossover.
    # With the layer-aware ``_build_segment_chains`` fix (this PR), a fresh
    # board-02 regen is copper-LVS clean (Overall: PASSED), so the full
    # e2e gate (regen → ``kct check`` Overall PASSED → board.json status:ok
    # / drc_violations:0 / lvs_clean:true) is now green and added here.
    # See the board-00 job above for the full rationale on container choice,
    # the C++ backend build, and the advisory (non-required-check) status
    # until a repo admin flips the branch-protection setting.
    name: Board 02 End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: kicad/kicad:10.0
      options: --user 0:0
    defaults:
      run:
        shell: bash
    env:
      # Issue #3799: pin PYTHONHASHSEED so the board-02 regen is
      # reproducible across runner environments (mirrors board-03/06/07).
      # The recipe ALSO pins it on the route subprocess, but pinning it at
      # the job level covers the whole regen pipeline (schematic + zone +
      # LVS) for belt-and-suspenders determinism.
      PYTHONHASHSEED: "42"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        run: uv run kct build-native

      - name: Regenerate board 02 from recipe (clean tmp directory)
        # The recipe exits non-zero if ERC/DRC/LVS fail OR write_lvs_report
        # raises BoardNetlistMismatch -- board 02 hard-gates on both the
        # copper-extracted and label-based comparators (require_clean=True).
        run: |
          set -euo pipefail
          rm -rf /tmp/board02-ci
          mkdir -p /tmp/board02-ci
          uv run python boards/02-charlieplex-led/generate_design.py /tmp/board02-ci

      - name: Assert kct check Overall PASSED on regenerated routed PCB
        run: |
          set -euo pipefail
          uv run kct check /tmp/board02-ci/charlieplex_3x3_routed.kicad_pcb \
            | tee /tmp/board02-ci/check.out
          grep -qE '^Overall:[[:space:]]+PASSED' /tmp/board02-ci/check.out

      - name: Emit board.json via kct board-metrics
        run: |
          set -euo pipefail
          rm -rf /tmp/board02-staging
          mkdir -p /tmp/board02-staging/02-charlieplex-led/output
          cp -r /tmp/board02-ci/. /tmp/board02-staging/02-charlieplex-led/output/
          uv run kct board-metrics /tmp/board02-staging/02-charlieplex-led

      - name: Assert artifacts + lvs.json + board.json fields
        # Reuse the generalized board-00 asserter with --stem so it derives
        # board 02's artifact names (charlieplex_3x3*.kicad_{sch,pcb}).
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_board_00_e2e.py \
            --stem charlieplex_3x3 \
            /tmp/board02-staging/02-charlieplex-led

  board-03-end-to-end:
    # Issue #3795 (#3780 Part 2): LVS-ONLY end-to-end gate for board 03
    # ("usb-joystick"), graduated out of ``ADVISORY_LVS_BOARDS``.  Board 03's
    # recipe now runs ``write_lvs_report(..., require_clean=True,
    # run_copper=True, run_label=False)`` -- a HARD copper-LVS gate.  A fresh
    # clean-room regen routes fully and regenerates copper-clean (0 shorts /
    # 0 opens, verified 2/2 runs), so this job is GREEN.
    #
    # This uses the asserter's ``--lvs-only`` mode (like boards 06/07), NOT
    # the full e2e asserter (boards 00/01/02).  Board 03 carries 4 advisory
    # ``via_in_pad`` DRC residuals (the recipe prints ``DRC: PASS``; the
    # board is not in ``.github/routed-drc-tolerance.yml``), so board-metrics
    # classifies it ``status: partial`` / ``drc_violations: 4``.  The full
    # asserter hard-asserts ``status: ok`` / ``drc_violations: 0`` and would
    # FAIL on those advisories; ``--lvs-only`` asserts only artifact presence
    # + ``lvs.json clean=true`` (+ ``board.json lvs_clean=true``), which is
    # the meaningful copper-LVS gate.
    #
    # The ``Build C++ router backend`` step is REQUIRED: the recipe re-routes
    # during regen, and per CLAUDE.md a missing native extension makes routing
    # multi-minute-per-net.  Board 03's recipe takes only an output-dir arg
    # (no ``--step`` / ``--seed``); it routes fully and exits 0.
    #
    # Advisory until a repo admin adds it to branch protection (same as the
    # board 00/01/02/06/07 e2e jobs).
    name: Board 03 End-to-End (LVS-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: kicad/kicad:10.0
      options: --user 0:0
    defaults:
      run:
        shell: bash
    env:
      PYTHONHASHSEED: "42"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        run: uv run kct build-native

      - name: Regenerate board 03 from recipe (clean tmp directory)
        # Board 03's recipe takes only an output-dir argument and routes
        # fully (no --step / --seed).  It regenerates copper-LVS clean and
        # exits 0.  write_lvs_report(require_clean=True) writes lvs.json and
        # raises on any copper short/open; the LVS-only asserter below is the
        # gate.
        run: |
          set -euo pipefail
          rm -rf /tmp/board03-ci
          mkdir -p /tmp/board03-ci
          uv run python boards/03-usb-joystick/generate_design.py \
            /tmp/board03-ci
          test -f /tmp/board03-ci/lvs.json

      - name: Emit board.json via kct board-metrics
        run: |
          set -euo pipefail
          rm -rf /tmp/board03-staging
          mkdir -p /tmp/board03-staging/03-usb-joystick/output
          cp -r /tmp/board03-ci/. /tmp/board03-staging/03-usb-joystick/output/
          uv run kct board-metrics /tmp/board03-staging/03-usb-joystick

      - name: Assert artifacts + lvs.json clean (LVS-only)
        # --lvs-only: assert artifact presence + lvs.json clean=true +
        # board.json lvs_clean=true, but NOT status:ok / drc_violations:0
        # (board 03 carries 4 advisory via_in_pad DRC residuals ->
        # status='partial').
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_board_00_e2e.py \
            --stem usb_joystick \
            --lvs-only \
            /tmp/board03-staging/03-usb-joystick

  board-06-end-to-end:
    # Issue #3779: LVS-ONLY end-to-end gate for board 06 ("diffpair-test").
    # Board 06 is a PCB-first routing fixture (USB3 connectors with no
    # schematic-side net), so its label-LVS is all ``schematic_net=None``
    # advisory noise.  Its recipe now runs
    # ``write_lvs_report(..., require_clean=True, run_copper=True,
    # run_label=False)`` in the ``--step all`` branch, hard-gating on the
    # copper-extracted comparator only and emitting ``output/lvs.json``.
    #
    # This job is a NEW, ADDITIVE gate -- it does NOT replace the
    # ``diffpair-routing-regression`` job (which keeps its allowlist-based
    # DRC coverage gate on the ``--step route`` re-route).  Unlike board
    # 00/01, board 06 carries allowlisted DRC residuals
    # (.github/routed-drc-tolerance.yml: diffpair_test_routed.kicad_pcb=18)
    # and routes PARTIAL by design, so its board.json is
    # ``status:"partial"`` / ``drc_violations>0``.  It therefore CANNOT
    # assert ``kct check Overall: PASSED`` or ``board.json status:ok`` --
    # this job uses the asserter's ``--lvs-only`` mode, which checks only
    # artifact presence + ``lvs.json clean=true`` (+ ``board.json
    # lvs_clean=true``).
    #
    # The recipe returns non-zero on PARTIAL routing (expected on this
    # board), so the regen step tolerates a non-zero recipe exit (``|| true``)
    # and the LVS-only asserter is the real gate: a copper short/open makes
    # ``write_lvs_report`` write ``lvs.json clean=false`` (before it raises),
    # which the asserter catches.  Determinism via ``--seed 42`` +
    # PYTHONHASHSEED (mirrors the routing-regression jobs).
    #
    # Advisory until a repo admin adds it to branch protection (same as the
    # board 00/01 e2e jobs).
    name: Board 06 End-to-End (LVS-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: kicad/kicad:10.0
      options: --user 0:0
    defaults:
      run:
        shell: bash
    env:
      PYTHONHASHSEED: "42"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Ensure container has prerequisites
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git cmake build-essential
          kicad-cli --version

      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python 3.12

      - name: Build C++ router backend
        run: uv run kct build-native

      - name: Regenerate board 06 from recipe (--step all, clean tmp directory)
        # PARTIAL routing is expected on this board (USB3_TX1 blocked by the
        # BGA partner-via escape, #2677), so the recipe may exit non-zero
        # even when copper-LVS is clean -- tolerate it (|| true).  The
        # LVS-only asserter below is the gate: write_lvs_report writes
        # lvs.json (clean=false before raising) on any copper short/open.
        run: |
          set -uo pipefail
          rm -rf /tmp/board06-ci
          mkdir -p /tmp/board06-ci
          uv run python boards/06-diffpair-test/generate_design.py \
            /tmp/board06-ci --step all --seed 42 || true
          test -f /tmp/board06-ci/lvs.json

      - name: Emit board.json via kct board-metrics
        run: |
          set -euo pipefail
          rm -rf /tmp/board06-staging
          mkdir -p /tmp/board06-staging/06-diffpair-test/output
          cp -r /tmp/board06-ci/. /tmp/board06-staging/06-diffpair-test/output/
          uv run kct board-metrics /tmp/board06-staging/06-diffpair-test

      - name: Assert artifacts + lvs.json clean (LVS-only)
        # --lvs-only: assert artifact presence + lvs.json clean=true +
        # board.json lvs_clean=true, but NOT status:ok / drc_violations:0
        # (board 06 carries allowlisted DRC residuals -> status='partial').
        run: |
          set -euo pipefail
          uv run python scripts/ci/check_board_00_e2e.py \
            --stem diffpair_test \
            --lvs-only \
            /tmp/board06-staging/06-diffpair-test

